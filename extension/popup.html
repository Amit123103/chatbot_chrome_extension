<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Smart Selection Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div>
        <h1>AI Assistant</h1>
        <p class="popup-version">v1.0.0</p>
      </div>
    </div>

    <div class="popup-status" id="statusSection">
      <div class="status-row">
        <span class="status-label">Backend</span>
        <span class="status-indicator" id="backendStatus">
          <span class="status-dot checking"></span>
          <span id="statusText">Checking...</span>
        </span>
      </div>
    </div>

    <div class="popup-section">
      <label class="toggle-row">
        <span>Enable Extension</span>
        <input type="checkbox" id="enableToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="popup-shortcuts">
      <h2>Keyboard Shortcuts</h2>
      <div class="shortcut-row">
        <span>Open Chat</span>
        <kbd>Ctrl+X</kbd>
      </div>
      <div class="shortcut-row">
        <span>Close Chat</span>
        <kbd>Ctrl+Z</kbd>
      </div>
      <div class="shortcut-row">
        <span>Toggle Chat</span>
        <kbd>Ctrl+Shift+Y</kbd>
      </div>
      <div class="shortcut-row">
        <span>Quick Hide</span>
        <kbd>Ctrl+Shift+H</kbd>
      </div>
    </div>

    <div class="popup-footer">
      <button class="popup-action-btn" id="openPopupBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open in Popup Window
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
