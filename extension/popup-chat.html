<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e4e4e7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1));
      border-bottom: 1px solid rgba(255,255,255,0.06);
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      color: white;
      box-shadow: 0 3px 10px rgba(99,102,241,0.3);
      flex-shrink: 0;
    }

    .header-text { flex: 1; }
    .title { font-weight: 600; font-size: 13px; color: #f4f4f5; letter-spacing: -0.01em; }
    .subtitle { font-size: 10px; color: #6366f1; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; }

    .header-actions { display: flex; gap: 4px; -webkit-app-region: no-drag; }

    .hdr-btn {
      width: 26px; height: 26px; border: none; border-radius: 6px;
      background: rgba(255,255,255,0.06); color: #a1a1aa;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .hdr-btn:hover { background: rgba(255,255,255,0.12); color: #f4f4f5; }
    .hdr-btn.danger:hover { background: rgba(239,68,68,0.2); color: #fca5a5; }

    /* ─── Messages ─── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
    .messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* Welcome */
    .welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 30px 16px; gap: 10px;
      height: 100%;
    }
    .welcome-icon {
      width: 52px; height: 52px; border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      display: flex; align-items: center; justify-content: center;
      color: white; box-shadow: 0 6px 20px rgba(99,102,241,0.3);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .welcome h3 { font-size: 14px; font-weight: 700; color: #f4f4f5; }
    .welcome p { font-size: 12px; color: #71717a; max-width: 240px; }
    .shortcuts {
      display: flex; flex-direction: column; gap: 4px; margin-top: 6px;
    }
    .shortcuts span { font-size: 10px; color: #52525b; }
    .shortcuts kbd {
      display: inline-block; padding: 1px 5px; font-size: 9px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px; color: #a1a1aa; font-family: 'Segoe UI', sans-serif;
    }

    /* Message Bubbles */
    .msg { margin-bottom: 12px; animation: slideIn 0.25s ease-out; }
    @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .msg-role { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .msg-user .msg-role { color: #34d399; }
    .msg-ai .msg-role { color: #a5b4fc; }

    .msg-badge {
      font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 8px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .msg-badge.code { background: rgba(251,146,60,0.15); color: #fb923c; }
    .msg-badge.text { background: rgba(52,211,153,0.15); color: #34d399; }

    .msg-body {
      padding: 10px 12px; border-radius: 10px;
      font-size: 12.5px; line-height: 1.6;
      word-break: break-word; overflow-wrap: break-word;
    }
    .msg-user .msg-body {
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.12);
      border-radius: 10px 10px 3px 10px;
    }
    .msg-ai .msg-body {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 10px 10px 10px 3px;
    }

    .msg-body p { margin: 0 0 6px 0; }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body strong { color: #f4f4f5; font-weight: 600; }
    .msg-body h2,.msg-body h3,.msg-body h4 { margin: 8px 0 4px; color: #e4e4e7; font-weight: 700; }
    .msg-body h2 { font-size: 14px; }
    .msg-body h3 { font-size: 13px; }
    .msg-body h4 { font-size: 12.5px; }
    .msg-body li { margin-left: 14px; margin-bottom: 3px; }
    .msg-body li.ol { list-style: decimal; }

    /* Code Blocks */
    .msg-body pre {
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 10px; padding-top: 8px;
      margin: 6px 0; overflow-x: auto; position: relative;
    }
    .msg-body pre code {
      font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
      font-size: 11.5px; line-height: 1.55; color: #e6edf3;
      background: none; padding: 0; border: none;
    }
    .msg-body code {
      font-family: 'Cascadia Code','Consolas',monospace;
      font-size: 11.5px; background: rgba(255,255,255,0.08);
      padding: 1px 5px; border-radius: 3px; color: #c9d1d9;
    }

    .copy-btn {
      position: absolute; top: 6px; right: 6px;
      padding: 2px 8px; font-size: 10px; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 5px;
      background: rgba(255,255,255,0.06); color: #a1a1aa;
      cursor: pointer; font-family: 'Segoe UI', sans-serif;
      transition: all 0.2s ease;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.12); color: #f4f4f5; }
    .copy-btn.copied { background: rgba(52,211,153,0.15); color: #34d399; border-color: rgba(52,211,153,0.3); }

    /* Loading */
    .loading-dots { display: flex; gap: 3px; align-items: center; margin-bottom: 4px; }
    .loading-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #6366f1; animation: bounce 1.4s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    .loading-text { font-size: 11px; color: #71717a; font-style: italic; }

    /* Error */
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px; padding: 10px 12px; color: #fca5a5;
      font-size: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }

    /* ─── Input ─── */
    .input-area {
      padding: 10px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.15);
    }
    .input-wrap {
      display: flex; gap: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 3px 3px 3px 10px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .input-wrap:focus-within {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 2px rgba(99,102,241,0.1);
    }
    .input-wrap input {
      flex: 1; background: none; border: none; outline: none;
      color: #e4e4e7; font-size: 12.5px; padding: 5px 0;
      font-family: 'Segoe UI', sans-serif;
    }
    .input-wrap input::placeholder { color: #52525b; }
    .send-btn {
      width: 30px; height: 30px; border: none; border-radius: 7px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(99,102,241,0.3);
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="title">AI Assistant</div>
      <div class="subtitle">Stealth Mode</div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" id="clearBtn" title="Clear chat">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
        </svg>
      </button>
      <button class="hdr-btn danger" id="closeBtn" title="Close (Ctrl+Z)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h3>AI Smart Selection Assistant</h3>
      <p>Select text on any page, or type a question below.</p>
      <div class="shortcuts">
        <span><kbd>Ctrl</kbd>+<kbd>X</kbd> Open Chat</span>
        <span><kbd>Ctrl</kbd>+<kbd>Z</kbd> Close Chat</span>
        <span><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Y</kbd> Toggle</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Ask anything..." autocomplete="off" spellcheck="false"/>
      <button class="send-btn" id="sendBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://chatbot-chrome-extension-wnhp.onrender.com';
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const closeBtn = document.getElementById('closeBtn');

    // ─── Event Listeners ───────────────────────────────────────
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    clearBtn.addEventListener('click', clearChat);
    closeBtn.addEventListener('click', () => window.close());

    // Keyboard: Ctrl+Z to close this window too
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && !e.shiftKey && e.key === 'z') {
        const tag = document.activeElement?.tagName?.toLowerCase();
        if (tag !== 'input' && tag !== 'textarea') {
          window.close();
        }
      }
    });

    // ─── Listen for selections from background ─────────────────
    chrome.runtime.onMessage.addListener((message, sender, sendResponse) => {
      if (message.action === 'new-selection') {
        handleNewSelection(message);
        sendResponse({ success: true });
      }
    });

    // On load: check if there's a pending selection
    chrome.runtime.sendMessage({ action: 'get-pending-selection' }, (response) => {
      if (response?.selection) {
        handleNewSelection(response.selection);
      }
    });

    // ─── Handle new selection from content script ──────────────
    async function handleNewSelection(data) {
      removeWelcome();
      addUserMessage(data.text, data.type === 'code');
      addLoading();

      try {
        const res = await fetch(`${BACKEND_URL}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: data.prompt, type: data.type })
        });
        const result = await res.json();
        removeLoading();

        if (res.ok && result.response) {
          addAIMessage(result.response);
        } else {
          addError(result.error || 'Unknown error from server.');
        }
      } catch (err) {
        removeLoading();
        addError('Cannot connect to backend. Is it running on port 3001?');
      }
    }

    // ─── Manual Send ───────────────────────────────────────────
    async function handleSend() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      removeWelcome();

      // User message
      const userDiv = document.createElement('div');
      userDiv.className = 'msg msg-user';
      userDiv.innerHTML = `<div class="msg-header"><span class="msg-role">You</span></div><div class="msg-body"><p>${esc(text)}</p></div>`;
      messagesEl.appendChild(userDiv);
      scroll();

      addLoading();

      try {
        const res = await fetch(`${BACKEND_URL}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text, type: 'text' })
        });
        const data = await res.json();
        removeLoading();

        if (res.ok && data.response) {
          addAIMessage(data.response);
        } else {
          addError(data.error || 'Unknown error.');
        }
      } catch {
        removeLoading();
        addError('Cannot connect to backend. Is it running on port 3001?');
      }
    }

    // ─── Message Helpers ───────────────────────────────────────
    function addUserMessage(text, isCode) {
      removeWelcome();
      const badge = isCode
        ? '<span class="msg-badge code">Code</span>'
        : '<span class="msg-badge text">Text</span>';
      const preview = text.length > 200 ? text.substring(0, 200) + '…' : text;

      const div = document.createElement('div');
      div.className = 'msg msg-user';
      div.innerHTML = `
        <div class="msg-header"><span class="msg-role">You</span>${badge}</div>
        <div class="msg-body">${isCode ? '<pre><code>' + esc(preview) + '</code></pre>' : '<p>' + esc(preview) + '</p>'}</div>
      `;
      messagesEl.appendChild(div);
      scroll();
    }

    function addAIMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg msg-ai';
      div.innerHTML = `
        <div class="msg-header"><span class="msg-role">AI Assistant</span></div>
        <div class="msg-body">${fmt(text)}</div>
      `;
      messagesEl.appendChild(div);

      // Copy buttons
      div.querySelectorAll('pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn'; btn.textContent = 'Copy';
        btn.onclick = () => {
          navigator.clipboard.writeText(pre.querySelector('code')?.textContent || pre.textContent);
          btn.textContent = 'Copied!'; btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
        };
        pre.appendChild(btn);
      });

      scroll();
    }

    function addLoading() {
      removeLoading();
      const div = document.createElement('div');
      div.className = 'msg msg-ai';
      div.id = 'loadingMsg';
      div.innerHTML = `
        <div class="msg-header"><span class="msg-role">AI Assistant</span></div>
        <div class="msg-body">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <span class="loading-text">Analyzing...</span>
        </div>
      `;
      messagesEl.appendChild(div);
      scroll();
    }

    function removeLoading() {
      document.getElementById('loadingMsg')?.remove();
    }

    function addError(msg) {
      removeLoading();
      const div = document.createElement('div');
      div.className = 'error-msg';
      div.innerHTML = `<span>⚠️</span><span>${esc(msg)}</span>`;
      messagesEl.appendChild(div);
      scroll();
    }

    function removeWelcome() {
      document.getElementById('welcome')?.remove();
    }

    function clearChat() {
      messagesEl.innerHTML = `
        <div class="welcome" id="welcome">
          <div class="welcome-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h3>AI Smart Selection Assistant</h3>
          <p>Select text on any page, or type a question below.</p>
          <div class="shortcuts">
            <span><kbd>Ctrl</kbd>+<kbd>X</kbd> Open Chat</span>
            <span><kbd>Ctrl</kbd>+<kbd>Z</kbd> Close Chat</span>
          </div>
        </div>`;
    }

    // ─── Formatting ────────────────────────────────────────────
    function fmt(text) {
      let h = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) =>
        `<pre><code>${esc(c.trim())}</code></pre>`);
      h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
      h = h.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/^### (.*$)/gm, '<h4>$1</h4>');
      h = h.replace(/^## (.*$)/gm, '<h3>$1</h3>');
      h = h.replace(/^# (.*$)/gm, '<h2>$1</h2>');
      h = h.replace(/^\d+\.\s+(.*$)/gm, '<li class="ol">$1</li>');
      h = h.replace(/^[-*]\s+(.*$)/gm, '<li>$1</li>');
      h = h.replace(/\n\n/g, '</p><p>');
      h = h.replace(/\n/g, '<br/>');
      if (!h.startsWith('<')) h = '<p>' + h + '</p>';
      return h;
    }

    function esc(s) {
      const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
      return s.replace(/[&<>"']/g, c => m[c]);
    }

    function scroll() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  </script>
</body>
</html>
